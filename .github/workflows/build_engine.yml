name: Build Green Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK r25c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            python3 python3-pip \
            git

      - name: Apply android fixes
        run: |
          if [ -d "srceng-android-android-fixes" ]; then
            echo "Applying android fixes..."
            cp -r srceng-android-android-fixes/. source-engine-android/ 2>/dev/null || true
          fi

      - name: Build ARM32 (armeabi-v7a)
        run: |
          cd source-engine-android
          mkdir -p build_arm32
          cd build_arm32
          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DGARRYSMOD_COMMON_PATH=$GITHUB_WORKSPACE/garrysmod_common-master
          ninja -j$(nproc)

      - name: Build ARM64 (arm64-v8a)
        run: |
          cd source-engine-android
          mkdir -p build_arm64
          cd build_arm64
          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DGARRYSMOD_COMMON_PATH=$GITHUB_WORKSPACE/garrysmod_common-master
          ninja -j$(nproc)

      - name: Collect output libraries
        run: |
          mkdir -p output/armeabi-v7a
          mkdir -p output/arm64-v8a
          find source-engine-android/build_arm32 -name "*.so" -exec cp {} output/armeabi-v7a/ \;
          find source-engine-android/build_arm64 -name "*.so" -exec cp {} output/arm64-v8a/ \;
          # Добавляем libhtml_chromium
          cp bin/armeabi-v7a/libhtml_chromium.so output/armeabi-v7a/ 2>/dev/null || true
          cp bin/arm64-v8a/libhtml_chromium.so output/arm64-v8a/ 2>/dev/null || true
          echo "=== ARM32 libraries ==="
          ls output/armeabi-v7a/
          echo "=== ARM64 libraries ==="
          ls output/arm64-v8a/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: green_engine_libs
          path: output/
